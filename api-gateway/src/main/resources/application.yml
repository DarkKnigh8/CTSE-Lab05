server:
  port: 8084

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: item-service
          uri: http://item-service:8081
          #uri: http://localhost:8081
          predicates:
            - Path=/items/**

        - id: order-service
          uri: http://order-service:8082
          #uri: http://localhost:8082
          predicates:
            - Path=/orders/**

        - id: payment-service
          #uri: http://localhost:8083
          uri: http://payment-service:8083
          predicates:
            - Path=/payments/**